apiVersion: tracee.aquasec.com/v1beta1
kind: Policy
metadata:
  name: openclaw-security
  annotations:
    description: Runtime security policy for OpenClaw containers — enforcement enabled
spec:
  scope:
    - global
  rules:
    # === ENFORCEMENT (sigkill) ===
    - event: ptrace
      actions:
        - sigkill
    - event: setuid
      actions:
        - sigkill
    - event: setgid
      actions:
        - sigkill
    - event: init_module
      actions:
        - sigkill
    - event: finit_module
      actions:
        - sigkill
    # === ENFORCEMENT: Memory protection ===
    - event: process_vm_writev
      actions:
        - sigkill
    - event: process_vm_readv
      actions:
        - sigkill
    # === ENFORCEMENT: File integrity — app code, skills, and assets ===
    # Defense-in-depth: containers run with read_only:true, so the overlay FS
    # already blocks writes. These rules catch anything that bypasses it
    # (container escape, mount misconfiguration, overlay remount).
    #
    # magic_write fires when a write changes a file's type signature (ELF header,
    # script shebang, etc). Kills the process that attempts to overwrite app code
    # with a new executable or script.
    - event: magic_write
      filters:
        - args.pathname startsWith "/app/dist/"
        - args.pathname startsWith "/app/skills/"
        - args.pathname startsWith "/app/assets/"
        - args.pathname = "/app/openclaw.mjs"
        - args.pathname = "/app/package.json"
      actions:
        - sigkill
    # Kill any process that deletes files from protected app directories.
    - event: security_inode_unlink
      filters:
        - args.pathname startsWith "/app/dist/"
        - args.pathname startsWith "/app/skills/"
        - args.pathname startsWith "/app/assets/"
        - args.pathname = "/app/openclaw.mjs"
        - args.pathname = "/app/package.json"
        - args.pathname = "/app/pnpm-lock.yaml"
      actions:
        - sigkill
    # Kill any process that renames/moves files out of protected directories.
    - event: security_inode_rename
      filters:
        - args.old_path startsWith "/app/dist/"
        - args.old_path startsWith "/app/skills/"
        - args.old_path startsWith "/app/assets/"
        - args.old_path = "/app/openclaw.mjs"
        - args.old_path = "/app/package.json"
      actions:
        - sigkill
    # Detect new executables dropped into any container (built-in signature).
    # Fires when an ELF binary appears that wasn't part of the original image.
    - event: dropped_executable
      actions:
        - sigkill
    # === MONITORING (log only) ===
    - event: security_file_open
    - event: sched_process_exec
    - event: net_packet_ipv4
    # === MONITORING: Package installation detection ===
    # Logs when any package manager binary executes inside monitored containers.
    # The alerter parses these events and sends Telegram notifications.
    # To enforce immutability (block installs), change actions to [sigkill].
    - event: sched_process_exec
      filters:
        - args.pathname endsWith "/apt-get"
        - args.pathname endsWith "/dpkg"
        - args.pathname endsWith "/pip"
        - args.pathname endsWith "/pip3"
        - args.pathname endsWith "/npm"
        - args.pathname endsWith "/apk"
      actions:
        - log
